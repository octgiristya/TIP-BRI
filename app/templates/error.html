{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 fade-in-up text-center">
        <h1 class="fw-bold text-gradient" style="font-size: 8rem; line-height: 1;">{{ status_code }}</h1>
        <h3 class="mb-4">{{ message }}</h3>
        
        <p class="text-secondary mb-5">
            The page or resource you are looking for does not exist, or an internal error has occurred.
        </p>
        
        <a href="/" class="btn btn-primary-glow px-4 py-2">
            <i class="fa-solid fa-house me-2"></i> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
