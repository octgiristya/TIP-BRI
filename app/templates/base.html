<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIA Threat Intelligence Dashboard</title>
    
    <!-- Vendor CSS -->
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/all.min.css" rel="stylesheet">
    <link href="/static/vendor/simple-datatables.css" rel="stylesheet">
    <link href="/static/vendor/flatpickr.min.css" rel="stylesheet">
    <link href="/static/vendor/sweetalert2.min.css" rel="stylesheet">
    <link href="/static/vendor/animate.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-gradient me-4" href="/">
                <i class="fa-solid fa-shield-halved text-primary me-2"></i> CIA DASHBOARD
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'brand' %}active{% endif %}" href="/">
                            <i class="fa-solid fa-globe me-1"></i> Brand Protection
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'card' %}active{% endif %}" href="/card-leak">
                            <i class="fa-solid fa-credit-card me-1"></i> Card Leak
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'account' %}active{% endif %}" href="/account-leak">
                            <i class="fa-solid fa-user-lock me-1"></i> Account Leak
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <div class="input-group me-3" style="width: 250px;">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fa-regular fa-calendar"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="global-date-range" placeholder="Last 7 Days (Select Date)">
                    </div>
                    {% if request.session.get('is_admin') %}
                        <a href="/godcia/" class="btn btn-sm btn-glass me-2"><i class="fa-solid fa-gear"></i> Admin</a>
                        <a href="/godcia/logout" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    {% else %}
                        <a href="/godcia/" class="btn btn-sm btn-glass"><i class="fa-solid fa-lock"></i></a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid py-4 animate__animated animate__fadeIn">
        {% block content %}{% endblock %}
    </div>

    <!-- Vendor JS -->
    <script src="/static/vendor/bootstrap.bundle.min.js"></script>
    <script src="/static/vendor/chart.umd.js"></script>
    <script src="/static/vendor/apexcharts.min.js"></script>
    <script src="/static/vendor/simple-datatables.js"></script>
    <script src="/static/vendor/flatpickr.min.js"></script>
    <script src="/static/vendor/sweetalert2.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
